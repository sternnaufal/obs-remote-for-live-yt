<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RemOBS - Premium Remote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header & Status */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Card System */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 16px;
            font-weight: 700;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--glass);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Connection Inputs */
        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        /* Scene Grid */
        .scene-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .scene-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .scene-btn.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 16px -4px rgba(59, 130, 246, 0.5);
        }

        .scene-btn.active::after {
            content: '●';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .control-btn {
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .control-btn.active {
            border-color: transparent;
        }

        /* Volume Sliders */
        .volume-section {
            margin-top: 8px;
        }

        .volume-row {
            margin-bottom: 16px;
        }

        .volume-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            padding: 0;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* To-Do List */
        .todo-item {
            background: var(--glass);
            padding: 14px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }

        .todo-item.completed {
            opacity: 0.5;
        }

        .todo-text {
            flex: 1;
            font-size: 0.9rem;
        }

        .todo-text.completed {
            text-decoration: line-through;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>RemOBS</h1>
            <div class="status-badge">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <!-- Connection Card -->
        <div class="card" id="connectionCard">
            <div class="card-title">Setup Connection</div>
            <div class="input-group">
                <input type="text" id="obsIp" placeholder="IP Address" value="192.168.0.8">
                <input type="number" id="obsPort" placeholder="Port" value="4455">
            </div>
            <input type="password" id="obsPassword" placeholder="Password (Optional)" style="margin-bottom: 12px;">
            <button class="btn btn-primary" onclick="connectOBS()" id="connectBtn" style="width: 100%;">Connect to OBS</button>
        </div>

        <!-- Dashboard Stats -->
        <div class="card" id="statsCard">
            <div class="card-title">Live Stats</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="statFps">0</span>
                    <span class="stat-label">FPS</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="statCpu">0%</span>
                    <span class="stat-label">CPU</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="statBitrate">0</span>
                    <span class="stat-label">kbps</span>
                </div>
            </div>
        </div>

        <!-- Scenes Card -->
        <div class="card">
            <div class="card-title">Active Scenes</div>
            <div class="scene-grid" id="sceneButtons">
                <div style="color: var(--text-dim); text-align: center; grid-column: span 2; padding: 20px;">
                    Connect to load scenes
                </div>
            </div>
        </div>

        <!-- Controls Card -->
        <div class="card">
            <div class="card-title">Quick Controls</div>
            <div class="action-grid">
                <button class="control-btn" id="streamBtn" onclick="toggleStreaming()" disabled>
                    <span class="icon">📡</span>
                    <span id="streamLabel">Start Stream</span>
                </button>
                <button class="control-btn" id="recordBtn" onclick="toggleRecording()" disabled>
                    <span class="icon">⏺️</span>
                    <span id="recordLabel">Start Record</span>
                </button>
                <button class="control-btn" id="micBtn" onclick="toggleMute()" disabled>
                    <span class="icon">🎤</span>
                    <span id="micLabel">Mute Mic</span>
                </button>
                <button class="control-btn" id="webcamBtn" onclick="toggleWebcam()" disabled>
                    <span class="icon">📷</span>
                    <span id="webcamLabel">Hide Cam</span>
                </button>
            </div>

            <hr>

            <div class="volume-section">
                <div class="volume-row">
                    <div class="volume-label">
                        <span>Desktop Audio</span>
                        <span id="volDesktopVal">100%</span>
                    </div>
                    <input type="range" id="volDesktop" min="0" max="1" step="0.01" value="1" disabled oninput="ubahVolume('Desktop Audio', this.value)">
                </div>
                <div class="volume-row">
                    <div class="volume-label">
                        <span>Mic/Aux</span>
                        <span id="volMicVal">100%</span>
                    </div>
                    <input type="range" id="volMic" min="0" max="1" step="0.01" value="1" disabled oninput="ubahVolume('Mic/Aux', this.value)">
                </div>
            </div>

            <div class="input-group" style="margin-top: 10px;">
                <input type="text" id="teksOverlay" placeholder="Update overlay text...">
                <button class="btn btn-primary" onclick="gantiTeks()" id="gantiTeksBtn" disabled>Update</button>
            </div>
        </div>

        <!-- To-Do Editor -->
        <div class="card">
            <div class="card-title">Stream To-Do List</div>
            <div class="input-group" style="margin-bottom: 16px;">
                <input type="text" id="todoInput" placeholder="Add new task...">
                <button class="btn btn-success" onclick="addTodo()" style="padding: 0 20px;">+</button>
            </div>
            <div id="todoList"></div>
            <div style="text-align: center; font-size: 0.7rem; color: var(--text-dim);" id="saveStatus">
                Autosaved to todo-data.json
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let connected = false;
        let requestId = 0;
        let scenesList = [];
        let currentSceneName = "";
        let statsInterval = null;
        
        const pendingRequests = new Map();

        function showToast(pesan, jenis = 'success') {
            const toast = document.createElement('div');
            toast.textContent = pesan;
            toast.className = 'toast';
            toast.style.background = jenis === 'success' ? 'var(--success)' : 'var(--danger)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function setBtnState(id, isActive, activeColor = 'var(--danger)') {
            const btn = document.getElementById(id);
            if (!btn) return;
            if (isActive) {
                btn.classList.add('active');
                btn.style.background = activeColor;
            } else {
                btn.classList.remove('active');
                btn.style.background = 'var(--glass)';
            }
        }

        function enableControls(enable) {
            const ids = ['streamBtn', 'recordBtn', 'micBtn', 'webcamBtn', 'volDesktop', 'volMic', 'gantiTeksBtn'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enable;
            });
            document.getElementById('connectBtn').textContent = enable ? 'Disconnect' : 'Connect to OBS';
            document.getElementById('connectBtn').className = enable ? 'btn btn-danger' : 'btn btn-primary';
            document.getElementById('connectBtn').onclick = enable ? disconnectOBS : connectOBS;
        }

        function sendRequest(requestType, requestData = {}) {
            return new Promise((resolve, reject) => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    reject(new Error("Not connected"));
                    return;
                }
                const id = (++requestId).toString();
                pendingRequests.set(id, { resolve, reject });
                ws.send(JSON.stringify({
                    "op": 6,
                    "d": { "requestId": id, "requestType": requestType, "requestData": requestData }
                }));
            });
        }

        async function connectOBS() {
            const ip = document.getElementById('obsIp').value;
            const port = document.getElementById('obsPort').value;
            const password = document.getElementById('obsPassword').value;
            
            showToast('Connecting...', 'success');
            
            try {
                ws = new WebSocket(`ws://${ip}:${port}`);
                
                ws.onopen = () => {
                    ws.send(JSON.stringify({
                        "op": 1,
                        "d": { "rpcVersion": 1, "authentication": password ? { "challenge": "", "salt": "" } : undefined }
                    }));
                };
                
                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.op === 2) { // Identified
                        connected = true;
                        document.getElementById('statusDot').className = 'status-dot connected';
                        document.getElementById('statusText').textContent = 'Connected';
                        enableControls(true);
                        showToast('✅ Connected to OBS', 'success');
                        await syncInitialState();
                        startStats();
                    }
                    else if (data.op === 7) { // Response
                        const id = data.d?.requestId;
                        if (id && pendingRequests.has(id)) {
                            const p = pendingRequests.get(id);
                            data.d.requestStatus.result ? p.resolve(data.d.responseData) : p.reject(data.d.requestStatus);
                            pendingRequests.delete(id);
                        }
                    }
                    else if (data.op === 5) { // Event
                        handleOBSEvent(data.d.eventType, data.d.eventData);
                    }
                };
                
                ws.onclose = () => {
                    connected = false;
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = 'Disconnected';
                    enableControls(false);
                    stopStats();
                };
                
            } catch (error) {
                showToast('❌ Connection Error', 'error');
            }
        }

        function disconnectOBS() {
            if (ws) ws.close();
        }

        async function syncInitialState() {
            try {
                const scenes = await sendRequest("GetSceneList");
                scenesList = scenes.scenes;
                currentSceneName = scenes.currentProgramSceneName;
                renderSceneButtons();

                const record = await sendRequest("GetRecordStatus");
                updateRecordUI(record.outputActive);

                const stream = await sendRequest("GetStreamStatus");
                updateStreamUI(stream.outputActive);

                try {
                    const mic = await sendRequest("GetInputMute", { "inputName": "Mic/Aux" });
                    updateMicUI(mic.inputMuted);
                    const micVol = await sendRequest("GetInputVolume", { "inputName": "Mic/Aux" });
                    document.getElementById('volMic').value = micVol.inputVolumeMul;
                    document.getElementById('volMicVal').textContent = Math.round(micVol.inputVolumeMul * 100) + '%';
                } catch(e) {}

                try {
                    const deskVol = await sendRequest("GetInputVolume", { "inputName": "Desktop Audio" });
                    document.getElementById('volDesktop').value = deskVol.inputVolumeMul;
                    document.getElementById('volDesktopVal').textContent = Math.round(deskVol.inputVolumeMul * 100) + '%';
                } catch(e) {}

            } catch (err) { console.error(err); }
        }

        function handleOBSEvent(type, data) {
            if (type === "CurrentProgramSceneChanged") {
                currentSceneName = data.sceneName;
                renderSceneButtons();
            } else if (type === "RecordStateChanged") {
                updateRecordUI(data.outputActive);
            } else if (type === "StreamStateChanged") {
                updateStreamUI(data.outputActive);
            } else if (type === "InputMuteStateChanged" && data.inputName === "Mic/Aux") {
                updateMicUI(data.inputMuted);
            } else if (type === "InputVolumeChanged") {
                const id = data.inputName === "Desktop Audio" ? "volDesktop" : (data.inputName === "Mic/Aux" ? "volMic" : null);
                if (id) {
                    document.getElementById(id).value = data.inputVolumeMul;
                    document.getElementById(id + 'Val').textContent = Math.round(data.inputVolumeMul * 100) + '%';
                }
            }
        }

        function startStats() {
            statsInterval = setInterval(async () => {
                if (!connected) return;
                try {
                    const stats = await sendRequest("GetStats");
                    document.getElementById('statFps').textContent = Math.round(stats.fps);
                    document.getElementById('statCpu').textContent = stats.cpuUsage.toFixed(1) + '%';
                    
                    const stream = await sendRequest("GetStreamStatus");
                    document.getElementById('statBitrate').textContent = stream.outputActive ? Math.round(stream.outputBytes / 1024) : 0;
                } catch(e) {}
            }, 2000);
        }

        function stopStats() {
            clearInterval(statsInterval);
            document.getElementById('statFps').textContent = '0';
            document.getElementById('statCpu').textContent = '0%';
            document.getElementById('statBitrate').textContent = '0';
        }

        function renderSceneButtons() {
            const container = document.getElementById('sceneButtons');
            container.innerHTML = '';
            scenesList.forEach(scene => {
                const btn = document.createElement('button');
                btn.className = `scene-btn ${scene.sceneName === currentSceneName ? 'active' : ''}`;
                btn.textContent = scene.sceneName;
                btn.onclick = () => sendRequest("SetCurrentProgramScene", { "sceneName": scene.sceneName });
                container.appendChild(btn);
            });
        }

        function updateRecordUI(active) {
            setBtnState('recordBtn', active);
            document.getElementById('recordLabel').textContent = active ? 'Stop Record' : 'Start Record';
        }

        function updateStreamUI(active) {
            setBtnState('streamBtn', active, 'var(--primary)');
            document.getElementById('streamLabel').textContent = active ? 'Stop Stream' : 'Start Stream';
        }

        function updateMicUI(muted) {
            setBtnState('micBtn', muted);
            document.getElementById('micLabel').textContent = muted ? 'Unmute Mic' : 'Mute Mic';
        }

        // Actions
        async function toggleStreaming() { sendRequest("ToggleStream"); }
        async function toggleRecording() { sendRequest("ToggleRecord"); }
        async function toggleMute() { sendRequest("ToggleInputMute", { "inputName": "Mic/Aux" }); }
        
        async function ubahVolume(name, val) {
            sendRequest("SetInputVolume", { "inputName": name, "inputVolumeMul": parseFloat(val) });
            document.getElementById(name === 'Desktop Audio' ? 'volDesktopVal' : 'volMicVal').textContent = Math.round(val * 100) + '%';
        }

        async function gantiTeks() {
            const t = document.getElementById('teksOverlay').value;
            if (!t) return showToast('Enter text', 'error');
            try {
                await sendRequest("SetInputSettings", { "inputName": "TeksOverlay", "inputSettings": { "text": t } });
                showToast('Text Updated');
                document.getElementById('teksOverlay').value = '';
            } catch(e) { showToast('Source "TeksOverlay" not found', 'error'); }
        }

        // To-Do Logic
        let todos = [];
        async function loadTodos() {
            try {
                const res = await fetch('todo-data.json?t=' + Date.now());
                todos = await res.json();
                renderTodos();
            } catch (e) { todos = []; renderTodos(); }
        }

        async function saveTodos() {
            await fetch('save-todo.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(todos) });
            renderTodos();
        }

        function renderTodos() {
            const container = document.getElementById('todoList');
            container.innerHTML = todos.length ? '' : '<div style="color:var(--text-dim);text-align:center;padding:10px;">No tasks</div>';
            todos.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `todo-item ${t.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleT(${i})">
                    <span class="todo-text ${t.completed ? 'completed' : ''}">${t.text}</span>
                    <button class="btn btn-danger btn-icon" onclick="delT(${i})">×</button>
                `;
                container.appendChild(div);
            });
        }

        function addTodo() {
            const el = document.getElementById('todoInput');
            if (el.value.trim()) { todos.push({ text: el.value.trim(), completed: false }); el.value = ''; saveTodos(); }
        }

        function delT(i) { todos.splice(i, 1); saveTodos(); }
        function toggleT(i) { todos[i].completed = !todos[i].completed; saveTodos(); }

        loadTodos();
    </script>
</body>
</html>
