<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Remote + To-Do</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .card h3 {
            color: white;
            margin-bottom: 12px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: white;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gray;
            display: inline-block;
        }
        .status-dot.connected {
            background: #22c55e;
        }
        .connection-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .connection-row input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: white;
        }
        .btn-connect {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .scene-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .scene-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .scene-btn:active {
            transform: scale(0.97);
        }
        .feature-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .feature-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-mic { background: #f59e0b; color: white; }
        .btn-record { background: #ef4444; color: white; }
        .btn-source { background: #8b5cf6; color: white; }
        .btn-replay { background: #ec489a; color: white; }
        .text-overlay {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .text-overlay input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: white;
        }
        .text-overlay button {
            padding: 10px 16px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .add-row input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: white;
        }
        .add-row button {
            padding: 10px 16px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .todo-item {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .todo-item.completed {
            opacity: 0.5;
        }
        .todo-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }
        .todo-text {
            flex: 1;
            color: white;
            font-size: 14px;
        }
        .todo-text.completed {
            text-decoration: line-through;
            color: #9ca3af;
        }
        .delete-todo {
            background: #ef4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .save-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #6b7280;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            font-size: 14px;
            font-weight: bold;
            animation: fadeInOut 1.5s ease;
        }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        }
        hr {
            border-color: #3a3a3a;
            margin: 12px 0;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>🎬 OBS Remote Control</h3>
            <div class="status-bar">
                <span>Status:</span>
                <span><span id="statusDot" class="status-dot"></span> <span id="statusText">Belum konek</span></span>
            </div>
            <div class="connection-row">
                <input type="text" id="obsIp" placeholder="IP OBS" value="192.168.0.8">
                <input type="number" id="obsPort" placeholder="Port" value="4455">
                <input type="password" id="obsPassword" placeholder="Password (kosongkan jika tidak ada)">
                <button class="btn-connect" onclick="connectOBS()">Konek</button>
            </div>
            
            <div class="scene-buttons" id="sceneButtons">
                <div style="color: gray; text-align: center; grid-column: span 2;">🔌 Konek dulu</div>
            </div>
            
            <hr>
            
            <div class="feature-buttons">
                <button class="feature-btn btn-mic" onclick="toggleMute()" id="micBtn" disabled>🎤 Mute Mic</button>
                <button class="feature-btn btn-record" onclick="toggleRecording()" id="recordBtn" disabled>⏺️ Start Record</button>
                <button class="feature-btn btn-source" onclick="toggleWebcam()" id="webcamBtn" disabled>📷 Sembunyi Kamera</button>
                <button class="feature-btn btn-replay" onclick="replayBuffer()" id="replayBtn" disabled>🔄 Replay</button>
            </div>
            
            <div class="text-overlay">
                <input type="text" id="teksOverlay" placeholder="Nama game / topik / host...">
                <button onclick="gantiTeks()" id="gantiTeksBtn" disabled>Ganti Teks</button>
            </div>
        </div>

        <div class="card">
            <h3>📝 To-Do List Editor (Tampil di OBS)</h3>
            <div class="add-row">
                <input type="text" id="todoInput" placeholder="Tugas baru...">
                <button onclick="addTodo()">+ Tambah</button>
            </div>
            <div id="todoList"></div>
            <div class="save-hint" id="saveStatus">✅ Otomatis tersimpan</div>
        </div>
    </div>

    <script>
        let ws = null;
        let connected = false;
        let requestId = 0;
        let scenesList = [];
        
        let isMuted = false;
        let isRecording = false;
        let isWebcamHidden = false;

        function showToast(pesan, jenis = 'success') {
            const toast = document.createElement('div');
            toast.textContent = pesan;
            toast.className = `toast ${jenis}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function enableButtons(enable) {
            const btns = ['micBtn', 'recordBtn', 'webcamBtn', 'replayBtn', 'gantiTeksBtn'];
            btns.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = !enable;
            });
        }

        function sendRequest(requestType, requestData = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return false;
            }
            
            const msg = {
                "op": 6,
                "d": {
                    "requestId": (++requestId).toString(),
                    "requestType": requestType,
                    "requestData": requestData
                }
            };
            ws.send(JSON.stringify(msg));
            return true;
        }

        async function connectOBS() {
            const ip = document.getElementById('obsIp').value;
            const port = document.getElementById('obsPort').value;
            const password = document.getElementById('obsPassword').value;
            const url = `ws://${ip}:${port}`;
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    // Kirim identifikasi (op 1)
                    const identifyMsg = {
                        "op": 1,
                        "d": {
                            "rpcVersion": 1,
                            "authentication": password ? { "challenge": "", "salt": "" } : undefined
                        }
                    };
                    ws.send(JSON.stringify(identifyMsg));
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        console.log("Received:", data);
                        
                        if (data.op === 2) {
                            // Identifikasi berhasil
                            connected = true;
                            document.getElementById('statusDot').className = 'status-dot connected';
                            document.getElementById('statusText').textContent = 'Terkoneksi';
                            enableButtons(true);
                            showToast('✅ Berhasil konek ke OBS!', 'success');
                            
                            // Ambil daftar scene
                            sendRequest("GetSceneList");
                        }
                        else if (data.op === 7 && data.d?.requestType === "GetSceneList") {
                            // Daftar scene
                            if (data.d.responseData?.scenes) {
                                scenesList = data.d.responseData.scenes;
                                renderSceneButtons();
                            }
                        }
                    } catch(e) {
                        console.log("Bukan JSON:", event.data);
                    }
                };
                
                ws.onerror = () => {
                    connected = false;
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = 'Gagal konek';
                    enableButtons(false);
                    showToast('❌ Gagal konek ke OBS', 'error');
                };
                
                ws.onclose = () => {
                    connected = false;
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = 'Terputus';
                    enableButtons(false);
                };
                
            } catch (error) {
                showToast('❌ Error: ' + error.message, 'error');
            }
        }

        function renderSceneButtons() {
            const container = document.getElementById('sceneButtons');
            if (!scenesList.length) {
                container.innerHTML = '<div style="color: gray; text-align: center; grid-column: span 2;">📭 Tidak ada scene</div>';
                return;
            }
            
            container.innerHTML = '';
            scenesList.forEach(scene => {
                const btn = document.createElement('button');
                btn.className = 'scene-btn';
                btn.textContent = scene.sceneName;
                btn.onclick = () => gantiScene(scene.sceneName);
                container.appendChild(btn);
            });
        }

        function gantiScene(sceneName) {
            if (!connected) {
                showToast('⚠️ Konek OBS dulu!', 'warning');
                return;
            }
            
            if (sendRequest("SetCurrentProgramScene", { "sceneName": sceneName })) {
                showToast(`✅ Ganti scene ke: ${sceneName}`, 'success');
            } else {
                showToast(`❌ Gagal ganti scene`, 'error');
            }
        }

        function toggleMute() {
            if (!connected) return;
            
            isMuted = !isMuted;
            if (sendRequest("SetInputMute", { "inputName": "Mic/Aux", "inputMuted": isMuted })) {
                const btn = document.getElementById('micBtn');
                if (isMuted) {
                    btn.innerHTML = '🔇 Unmute Mic';
                    btn.style.background = '#ef4444';
                    showToast('🔇 Mic dimute', 'success');
                } else {
                    btn.innerHTML = '🎤 Mute Mic';
                    btn.style.background = '#f59e0b';
                    showToast('🎤 Mic unmute', 'success');
                }
            }
        }

        function toggleRecording() {
            if (!connected) return;
            
            if (!isRecording) {
                if (sendRequest("StartRecord")) {
                    isRecording = true;
                    const btn = document.getElementById('recordBtn');
                    btn.innerHTML = '⏹️ Stop Record';
                    btn.style.background = '#dc2626';
                    showToast('⏺️ Rekaman dimulai', 'success');
                }
            } else {
                if (sendRequest("StopRecord")) {
                    isRecording = false;
                    const btn = document.getElementById('recordBtn');
                    btn.innerHTML = '⏺️ Start Record';
                    btn.style.background = '#ef4444';
                    showToast('⏹️ Rekaman berhenti', 'success');
                }
            }
        }

        function toggleWebcam() {
            if (!connected) return;
            
            isWebcamHidden = !isWebcamHidden;
            // Kirim request untuk cari scene item id
            sendRequest("GetSceneItemList", { "sceneName": "Current" });
            
            const btn = document.getElementById('webcamBtn');
            if (isWebcamHidden) {
                btn.innerHTML = '📷 Tampil Kamera';
                btn.style.background = '#22c55e';
                showToast('📷 Webcam disembunyikan', 'success');
            } else {
                btn.innerHTML = '📷 Sembunyi Kamera';
                btn.style.background = '#8b5cf6';
                showToast('📷 Webcam ditampilkan', 'success');
            }
        }

        function replayBuffer() {
            if (!connected) return;
            
            if (sendRequest("SaveReplayBuffer")) {
                showToast('🔄 Replay saved!', 'success');
            }
        }

        function gantiTeks() {
            if (!connected) return;
            
            const teks = document.getElementById('teksOverlay').value;
            if (!teks) {
                showToast('⚠️ Masukkan teks dulu', 'warning');
                return;
            }
            
            if (sendRequest("SetInputSettings", {
                "inputName": "TeksOverlay",
                "inputSettings": { "text": teks }
            })) {
                showToast(`📝 Teks diganti: ${teks}`, 'success');
                document.getElementById('teksOverlay').value = '';
            }
        }

        // ========== TO-DO LIST ==========
        let todos = [];

        async function loadTodos() {
            try {
                const response = await fetch('todo-data.json?t=' + Date.now());
                todos = await response.json();
                renderTodos();
            } catch (error) {
                todos = [
                    { text: 'Cek microphone', completed: false },
                    { text: 'Siapkan slide', completed: false },
                    { text: 'Opening speech', completed: false }
                ];
                renderTodos();
                saveTodos();
            }
        }

        async function saveTodos() {
            try {
                await fetch('save-todo.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(todos)
                });
                document.getElementById('saveStatus').style.color = '#22c55e';
                document.getElementById('saveStatus').textContent = '✅ Tersimpan!';
                setTimeout(() => {
                    document.getElementById('saveStatus').style.color = '#6b7280';
                    document.getElementById('saveStatus').textContent = '✅ Otomatis tersimpan';
                }, 2000);
            } catch (error) {
                console.error('Gagal simpan:', error);
            }
        }

        function renderTodos() {
            const container = document.getElementById('todoList');
            if (todos.length === 0) {
                container.innerHTML = '<div style="color: #6b7280; text-align: center; padding: 20px;">📭 Belum ada tugas</div>';
                return;
            }
            container.innerHTML = '';
            todos.forEach((todo, index) => {
                const div = document.createElement('div');
                div.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleComplete(${index})">
                    <span class="todo-text ${todo.completed ? 'completed' : ''}">${escapeHtml(todo.text)}</span>
                    <button class="delete-todo" onclick="deleteTodo(${index})">Hapus</button>
                `;
                container.appendChild(div);
            });
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (text) {
                todos.push({ text: text, completed: false });
                input.value = '';
                renderTodos();
                saveTodos();
            }
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            renderTodos();
            saveTodos();
        }

        function toggleComplete(index) {
            todos[index].completed = !todos[index].completed;
            renderTodos();
            saveTodos();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadTodos();
    </script>
</body>
</html>
