<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>To-Do Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: rgba(0,0,0,0.7);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 15px;
            color: white;
        }
        .todo-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
            font-size: 14px;
        }
        .todo-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
            border-left-color: #22c55e;
        }
        .empty {
            text-align: center;
            color: gray;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="todoList">Loading...</div>
    <script>
        async function load() {
            try {
                const res = await fetch('todo-data.json?t=' + Date.now());
                const todos = await res.json();
                const container = document.getElementById('todoList');
                if (!todos.length) {
                    container.innerHTML = '<div class="empty">📝 No tasks</div>';
                    return;
                }
                container.innerHTML = todos.map((t, i) => `
                    <div class="todo-item ${t.completed ? 'completed' : ''}">
                        ${i+1}. ${escapeHtml(t.text)}
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('todoList').innerHTML = '<div class="empty">Error loading</div>';
            }
        }
        function escapeHtml(t) {
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }
        load();
        setInterval(load, 1000);
    </script>
</body>
</html>
